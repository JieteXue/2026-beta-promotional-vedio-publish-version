<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Staff执行规范 · 内部手册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg-deep: #050508;
      --bg-card: #0d0d14;
      --bg-card-alt: #0f0f18;
      --border: #1a1a26;
      --border-hover: #252536;
      --text: #e0e0e8;
      --text-secondary: #8a8a9a;
      --text-muted: #5a5a6e;
      --accent: #5b9bd5;
      --accent-soft: rgba(91,155,213,0.08);
      --accent-border: rgba(91,155,213,0.2);
      --tag-bg: rgba(91,155,213,0.08);
      --tag-text: #6aa8e0;
      --highlight-bg: rgba(91,155,213,0.12);
      --highlight-border: #5b9bd5;
      --radius-sm: 6px;
      --radius: 14px;
      --radius-lg: 20px;
      --font: 'Noto Sans SC','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-deep);
      font-family: var(--font);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: 0.01em;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .handbook {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .title-main {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      color: #ececf4;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .title-main .accent-dot {
      color: var(--accent);
      font-weight: 400;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill.archive {
      color: #8a8a9a;
      background: rgba(139,151,168,0.08);
      border-color: rgba(139,151,168,0.2);
    }
    .pill i {
      font-size: 8px;
    }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-line span {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .meta-line i {
      font-size: 8px;
      color: var(--accent);
      opacity: 0.5;
    }
    .divider {
      height: 1px;
      background: var(--border);
      width: 100%;
      margin-top: 4px;
    }

    /* 个人任务高亮卡片 */
    .my-task-card {
      background: linear-gradient(135deg, var(--highlight-bg), rgba(91,155,213,0.03));
      border: 2px solid var(--accent);
      border-radius: 20px;
      padding: 18px 20px;
      margin: 12px 0 8px 0;
      box-shadow: 0 0 20px rgba(91,155,213,0.15);
    }
    .my-task-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .my-task-icon {
      font-size: 32px;
    }
    .my-task-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }
    .my-task-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .task-list {
      list-style: none;
      padding-left: 0;
    }
    .task-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #c0c8d4;
    }
    .task-list li i {
      color: var(--accent);
      margin-top: 3px;
      font-size: 11px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .section-head {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #bcc5d0;
      letter-spacing: 0.02em;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .rule-table {
      width: 100%;
      border-collapse: collapse;
    }
    .rule-table td {
      vertical-align: top;
      padding: 0 0 5px 0;
      font-size: 13px;
      color: #b0b9c4;
      line-height: 1.6;
      word-break: break-word;
    }
    .rule-table tr:last-child td {
      padding-bottom: 0;
    }
    .td-dot {
      width: 12px;
      padding-right: 5px !important;
    }
    .rule-dot {
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 7px;
      opacity: 0.5;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      letter-spacing: 0.02em;
      white-space: nowrap;
      vertical-align: baseline;
      line-height: 1.45;
    }
    .tag-purple {
      background: rgba(160,120,220,0.08);
      color: #b090e0;
    }
    .tag-amber {
      background: rgba(220,180,100,0.08);
      color: #d4b464;
    }
    .tag-teal {
      background: rgba(80,200,180,0.08);
      color: #50c8b4;
    }
    .tag-rose {
      background: rgba(220,110,130,0.08);
      color: #dc6e82;
    }

    .muted-text {
      color: var(--text-muted);
      font-style: italic;
    }

    .sub-card {
      background: #08080f;
      border: 1px solid #151a26;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 6px;
    }
    .sub-card-title {
      font-size: 11px;
      font-weight: 600;
      color: #8a8a9a;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sub-card-title i {
      font-size: 8px;
      color: var(--accent);
    }

    .staff-roles {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .role-card {
      background: #08080f;
      border: 1px solid #151a26;
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .role-card:hover {
      border-color: #253550;
      background: #0c1119;
    }
    .role-card.highlight {
      border: 2px solid var(--accent);
      background: var(--highlight-bg);
    }
    .role-icon {
      font-size: 18px;
      margin-bottom: 4px;
      color: var(--accent);
    }
    .role-name {
      font-size: 12px;
      font-weight: 600;
      color: #d0d8e2;
    }
    .role-desc {
      font-size: 10px;
      color: #6b7a90;
      line-height: 1.3;
      margin-top: 2px;
    }

    .flow-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 8px;
      display: flex;
      justify-content: center;
      overflow-x: auto;
    }
    .flow-box svg {
      width: 100%;
      max-width: 680px;
      height: auto;
    }

    .footer {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      font-size: 11px;
      color: var(--text-muted);
      padding-top: 4px;
    }
    .footer span {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .footer i {
      font-size: 7px;
      color: var(--accent);
      opacity: 0.45;
    }

    .detail-page {
      display: none;
      flex-direction: column;
      gap: 18px;
    }
    .detail-page.active {
      display: flex;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      padding: 6px 12px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      align-self: flex-start;
    }
    .back-btn:hover {
      background: rgba(91,155,213,0.14);
      border-color: var(--accent);
    }

    @media (max-width: 480px) {
      .handbook {
        padding: 16px 10px 32px;
        gap: 14px;
      }
      .card {
        padding: 12px 12px;
      }
      .rule-table td {
        font-size: 12px;
      }
      .tag {
        font-size: 11px;
        padding: 1px 5px;
      }
      .staff-roles {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
      }
    }

    @media (min-width: 500px) {
      .staff-roles {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>

  <div class="handbook" id="handbookRoot">
    <!-- 动态内容会插入此处，保留原有所有公共部分 -->
  </div>

  <script>
    // ==================== 岗位任务定义（完整版） ====================
    const ROLE_TASKS = {
      '任务交互': {
        icon: '🎭',
        name: '任务交互NPC',
        tasks: [
          '📋 无任务阶段：指导提示，等待游戏开始（场控发令）',
          '📍 有任务阶段：听场控命令，查询任务地点并前往',
          '🔘 到任务地点后开启定位，划定任务圈',
          '📢 在高德地图发布「文字+语音」提示，声明任务内容和持续时长',
          '🤝 按照约定接待玩家',
          '📝 在「玩家状态记录群聊」中报告获取技能',
          '⏰ 倒计时阶段发布语音和文字提醒',
          '🚫 时间到后取消画圈和自身定位，高德地图声明结束任务',
          '🏠 回到 H4 等待分派新任务'
        ]
      },
      '督查与回收': {
        icon: '🔍',
        name: '督查与回收',
        tasks: [
          '👀 监督场上是否有人违规（违规骑车、持续在楼内等待）',
          '📝 发现违规后记录并上报场控',
          '📦 听从场控私聊指令，回收奖励盒',
          '🔢 记录回收盒子的编号，上报给场控'
        ]
      },
      '场控': {
        icon: '📡',
        name: '场控',
        tasks: [
          '👁️ 监督者：对比玩家状态记录群中的状态提示',
          '📋 接收并记录场上玩家发动的技能信息',
          '⏱️ 到时间提醒玩家',
          '🗺️ 辅助交互场控（查看地图等）',
          '💬 查看私信，回复玩家',
          '🎭 指挥任务交互NPC'
        ]
      },
      '跟队摄影': {
        icon: '🎥',
        name: '跟队摄影',
        tasks: [
          '👥 跟随指定队伍，参与游戏全过程',
          '🎬 拍摄本队游戏全程影像资料',
          '🏃 与队伍同步移动，记录团队协作瞬间',
          '📸 重点拍摄本队完成任务、抓捕、被追逃等环节',
          '🎙️ 适当参与游戏机制（如需遵守游戏规则）',
          '🚫 避免使用闪光灯干扰本队及对手玩家',
          '📤 活动结束后整理本队素材并上传至指定位置'
        ]
      },
      '游走摄影': {
        icon: '📷',
        name: '游走摄影',
        tasks: [
          '🚶 分散在校园各区域，自由移动或驻守点位',
          '🎬 以第三视角抓拍全场精彩瞬间',
          '🏹 重点拍摄：追捕对抗、任务交互、玩家反应',
          '👥 拍摄团队合影与活动花絮',
          '🚫 注意不影响游戏正常进行，保持适当距离',
          '⚠️ 避免使用闪光灯干扰玩家',
          '📤 活动结束后整理素材并上传至指定位置'
        ]
      },
      '积分兑换处': {
        icon: '💰',
        name: '积分兑换处',
        tasks: [
          '📍 常驻位置：E9-C18 拱桥（手环-积分兑换处）',
          '🔄 接收玩家用抓人获得的手环兑换积分（1手环 = 10积分）',
          '🏆 游戏时间结束后，组织所有人在积分兑换处集合',
          '📊 协助各队伍统计总积分，核算最终获胜队伍',
          '🎁 发放获胜队伍奖励',
          '⚠️ 安全区范围内禁止抓人，维持现场秩序'
        ]
      }
    };

    // ==================== 从 staff-list.txt 读取职务分配 ====================
    let staffAssignment = {}; // { '姓名': '职务' }
    let loaded = false;

    async function loadStaffAssignment() {
      try {
        const timestamp = new Date().getTime();
        const response = await fetch(`staff-list.txt?t=${timestamp}`);
        const text = await response.text();
        const lines = text.split('\n');
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith('#')) continue;
          const parts = trimmed.split('|');
          if (parts.length === 2) {
            const name = parts[0].trim();
            const role = parts[1].trim();
            if (ROLE_TASKS[role]) {
              staffAssignment[name] = role;
            } else {
              console.warn(`未知职务: ${role} for ${name}`);
            }
          }
        }
        loaded = true;
        console.log('已加载Staff分配:', staffAssignment);
      } catch (e) {
        console.error('加载 staff-list.txt 失败:', e);
        loaded = true; // 避免无限等待
      }
    }

    // 获取URL参数中的姓名
    function getStaffNameFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('name') || '';
    }

    // 渲染完整页面（保留所有公共部分 + 高亮个人任务）
    async function renderFullPage() {
      await loadStaffAssignment();
      
      const staffName = getStaffNameFromURL();
      const myRole = staffAssignment[staffName] || null;
      const myRoleData = myRole ? ROLE_TASKS[myRole] : null;
      
      const container = document.getElementById('handbookRoot');
      if (!container) return;

      // 构建个人任务高亮区域
      let myTaskHtml = '';
      if (myRoleData && staffName) {
        const taskItems = myRoleData.tasks.map(task => `<li><i class="fas fa-check-circle"></i> ${task}</li>`).join('');
        myTaskHtml = `
          <div class="my-task-card">
            <div class="my-task-header">
              <div class="my-task-icon">${myRoleData.icon}</div>
              <div>
                <div class="my-task-title">✨ 您的专属任务 · ${myRoleData.name}</div>
                <div class="my-task-sub">工作人员：${staffName}</div>
              </div>
            </div>
            <ul class="task-list">
              ${taskItems}
            </ul>
          </div>
        `;
      } else if (staffName) {
        myTaskHtml = `
          <div class="my-task-card" style="border-color:#dc6e82;">
            <div class="my-task-header">
              <div class="my-task-icon">⚠️</div>
              <div>
                <div class="my-task-title" style="color:#dc6e82;">未找到职务分配</div>
                <div class="my-task-sub">工作人员：${staffName}，请在 staff-list.txt 中配置 姓名|职务</div>
              </div>
            </div>
          </div>
        `;
      }

      // 构建岗位卡片（高亮当前用户岗位）
      let rolesHtml = '';
      for (const [roleKey, roleData] of Object.entries(ROLE_TASKS)) {
        const isHighlight = (myRole === roleKey);
        rolesHtml += `
          <div class="role-card ${isHighlight ? 'highlight' : ''}" onclick="showDetail('${roleKey}')">
            <div class="role-icon">${roleData.icon}</div>
            <div class="role-name">${roleData.name}</div>
            <div class="role-desc">${roleData.tasks.length}项职责</div>
          </div>
        `;
      }

      // 保存 staffName 供详情页使用
      window.currentStaffName = staffName;

      // 完整HTML（保留所有原有公共内容）
      container.innerHTML = `
        <!-- ==================== 首页 ==================== -->
        <div id="page-home" class="detail-page active">
          <div class="header">
            <div class="header-row">
              <div class="title-main">Staff执行规范<span class="accent-dot"> · </span>内部手册</div>
              <div>
                <span class="pill"><i class="fas fa-code-branch"></i> v1.1.0</span>
                <span class="pill archive" style="margin-left:4px;"><i class="fas fa-archive"></i> 归档</span>
              </div>
            </div>
            <div class="meta-line">
              <span><i class="fas fa-pen"></i> 薛杰特</span>
              <span><i class="far fa-calendar"></i> 2026-05-06</span>
            </div>
            <div class="divider"></div>
          </div>

          <!-- 个人任务高亮区域 -->
          ${myTaskHtml}
          
          <!-- ⚠️ 重要通知：全体Staff集合 ⚠️ -->
          <div style="background: linear-gradient(135deg, #1a0a0e, #0d0a0f); border: 2px solid #dc6e82; border-radius: 20px; padding: 16px 20px; margin: 8px 0 4px 0; text-align: center;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px;">
              <span style="font-size: 24px;">⏰</span>
              <span style="font-size: 18px; font-weight: 800; color: #dc6e82;">紧急 · 全体Staff集合</span>
              <span style="font-size: 24px;">📍</span>
            </div>
            <div style="font-size: 20px; font-weight: 800; color: #d4a968; letter-spacing: 0.02em;">
              5月16日 (周六) 14:30
            </div>
            <div style="font-size: 15px; font-weight: 500; color: #e0e0e8; margin: 6px 0;">
              📍 H4 · Beta公共空间
            </div>
            <div id="countdown-timer" style="font-size: 28px; font-weight: 800; color: #dc6e82; margin: 8px 0; font-family: monospace;">
              --
            </div>
            <div style="font-size: 12px; color: #8a8a9a;">
              请所有Staff准时到场，迟到请提前报备场控
            </div>
          </div>
          
          <div class="section">
            <div class="section-head">
              <div class="section-icon"><i class="fas fa-users-cog"></i></div>
              <div class="section-title">Staff 类型 · 点击查看详情</div>
            </div>
            <div class="card">
              <div class="staff-roles">
                ${rolesHtml}
              </div>
            </div>
          </div>

          <!-- 群聊规范（公共部分，保留原有内容） -->
          <div class="section">

    // 页面切换函数
    function showPage(pageId) {
      document.querySelectorAll('.detail-page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showDetail(roleKey) {
      const pageMap = {
        '任务交互': 'page-npc',
        '督查与回收': 'page-inspector',
        '场控': 'page-controller',
        '跟队摄影': 'page-team-photo',
        '游走摄影': 'page-walk-photo',
        '积分兑换处': 'page-exchange'
      };
      const targetPage = pageMap[roleKey];
      if (targetPage && targetPage !== 'page-home') {
        showPage(targetPage);
      } else {
        // 如果是积分兑换处或未映射，滚动到对应卡片高亮提示
        const roleCard = document.querySelector(`.role-card .role-name:contains('${roleKey}')`);
        if (roleCard) roleCard.closest('.role-card')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
    
    // 倒计时函数
    function updateCountdown() {
      var target = new Date(2026, 4, 16, 14, 30, 0); // 2026年5月16日 14:30
      var now = new Date();
      var diff = target - now;
      
      var timerEl = document.getElementById('countdown-timer');
      if (!timerEl) return;
      
      if (diff <= 0) {
        timerEl.innerHTML = '🔥 集合时间已到 🔥';
        return;
      }
      
      var days = Math.floor(diff / (1000 * 60 * 60 * 24));
      var hours = Math.floor((diff % (86400000)) / (3600000));
      var minutes = Math.floor((diff % 3600000) / 60000);
      var seconds = Math.floor((diff % 60000) / 1000);
      
      var hoursStr = hours < 10 ? '0' + hours : '' + hours;
      var minutesStr = minutes < 10 ? '0' + minutes : '' + minutes;
      var secondsStr = seconds < 10 ? '0' + seconds : '' + seconds;
      
      var text = '';
      if (days > 0) text = days + '天 ';
      text += hoursStr + ':' + minutesStr + ':' + secondsStr;
      
      timerEl.innerHTML = text;
    }
    
    updateCountdown();
    setInterval(updateCountdown, 1000);
    
    // 暴露全局函数
    window.showPage = showPage;
    window.showDetail = showDetail;

    // 启动渲染
    renderFullPage();

    // ==================== 粒子动画 ====================
    (function() {
      const c = document.getElementById('particles-canvas');
      if (!c) return;
      const ctx = c.getContext('2d');
      let w, h, ps = [], mx = -1000, my = -1000, tx = -1000, ty = -1000;
      const n = 60, d = 100;

      function rs() { w = innerWidth; h = innerHeight; c.width = w; c.height = h; }
      class P {
        constructor() { this.rst(); }
        rst() { this.x = Math.random() * w; this.y = Math.random() * h; this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3; this.r = Math.random() * 1.2 + 0.4; this.br = this.r; }
        up() { const dx = this.x - mx, dy = this.y - my, ds = Math.sqrt(dx * dx + dy * dy), rd = 130; if (ds < rd) { const f = (rd - ds) / rd, a = Math.atan2(dy, dx); this.x += Math.cos(a) * f * 1.2; this.y += Math.sin(a) * f * 1.2; this.r = this.br + f * 1.5; } else this.r += (this.br - this.r) * 0.08; this.x += this.vx; this.y += this.vy; if (this.x < -20) this.x = w + 20; if (this.x > w + 20) this.x = -20; if (this.y < -20) this.y = h + 20; if (this.y > h + 20) this.y = -20; }
        dr() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(91,155,213,0.35)'; ctx.fill(); }
      }
      function init() { ps = []; for (let i = 0; i < n; i++) ps.push(new P()); }
      function lines() { for (let i = 0; i < ps.length; i++) for (let j = i + 1; j < ps.length; j++) { const dx = ps[i].x - ps[j].x, dy = ps[i].y - ps[j].y, ds = Math.sqrt(dx * dx + dy * dy); if (ds < d) { ctx.beginPath(); ctx.moveTo(ps[i].x, ps[i].y); ctx.lineTo(ps[j].x, ps[j].y); ctx.strokeStyle = `rgba(91,155,213,${(1-ds/d)*0.18})`; ctx.lineWidth = 0.3; ctx.stroke(); } } }
      function anim() { ctx.clearRect(0, 0, w, h); mx += (tx - mx) * 0.06; my += (ty - my) * 0.06; ps.forEach(p => { p.up(); p.dr(); }); lines(); requestAnimationFrame(anim); }
      window.addEventListener('resize', () => { rs(); init(); });
      window.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
      window.addEventListener('mouseleave', () => { tx = -1000; ty = -1000; });
      rs(); init(); anim();
    })();
  </script>
