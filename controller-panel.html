<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>场控辅助系统 · 倒计时管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050508;
      font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
      color: #e0e0e8;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1a1a26;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #5b9bd5;
    }
    .title i {
      margin-right: 8px;
    }
    .badge {
      background: #0d0d14;
      border: 1px solid #1a1a26;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: #8a8a9a;
    }

    .form-section {
      background: #0d0d14;
      border: 1px solid #1a1a26;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-title {
      font-size: 14px;
      font-weight: 600;
      color: #5b9bd5;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      flex: 1;
      min-width: 150px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      color: #8a8a9a;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: #08080f;
      border: 1px solid #1c1c2a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: #e0e0e8;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #5b9bd5;
      box-shadow: 0 0 0 3px rgba(91,155,213,0.1);
    }
    .form-group input::placeholder {
      color: #3a3a4a;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #5b9bd5;
      color: #050508;
    }
    .btn-primary:hover {
      background: #4a8ac4;
      transform: translateY(-1px);
    }
    .btn-success {
      background: #5ac882;
      color: #050508;
    }
    .btn-success:hover {
      background: #4ab872;
    }
    .btn-warning {
      background: #d4a968;
      color: #050508;
    }
    .btn-warning:hover {
      background: #c49858;
    }
    .btn-secondary {
      background: #1a1a26;
      color: #b0b9c4;
      border: 1px solid #252536;
    }
    .btn-secondary:hover {
      background: #252536;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #0d0d14;
      border: 1px solid #1a1a26;
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #5b9bd5;
    }
    .stat-label {
      font-size: 11px;
      color: #8a8a9a;
    }

    .timers-section {
      background: #0d0d14;
      border: 1px solid #1a1a26;
      border-radius: 16px;
      padding: 20px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: #5b9bd5;
    }
    .timer-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .timer-item {
      background: #08080f;
      border: 1px solid #1a1a26;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.2s;
      position: relative;
    }
    .timer-item.status-expired {
      border-left: 4px solid #dc6e82;
      background: #1a0a0e;
    }
    .timer-item.status-pending {
      border-left: 4px solid #8a8a9a;
    }
    .timer-item.status-running {
      border-left: 4px solid #5b9bd5;
      background: #0c1119;
    }
    .timer-item.status-confirmed {
      border-left: 4px solid #5a6e5a;
      opacity: 0.7;
    }
    
    /* 删除按钮（右上角小叉） */
    .delete-icon {
      position: absolute;
      top: 8px;
      right: 12px;
      color: #5a5a6e;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.2s;
      z-index: 10;
    }
    .delete-icon:hover {
      color: #dc6e82;
      background: rgba(220,110,130,0.1);
    }
    
    .timer-info {
      flex: 2;
      min-width: 180px;
      padding-right: 30px;
    }
    .timer-code {
      font-size: 18px;
      font-weight: 700;
      color: #5b9bd5;
      font-family: monospace;
    }
    .timer-name {
      font-size: 14px;
      font-weight: 500;
      color: #e0e0e8;
    }
    .timer-skill {
      font-size: 12px;
      color: #d4a968;
      margin-top: 4px;
    }
    .timer-time {
      flex: 1;
      min-width: 120px;
      text-align: center;
    }
    .timer-display {
      font-size: 28px;
      font-weight: 700;
      font-family: monospace;
    }
    .timer-display.running {
      color: #5b9bd5;
    }
    .timer-display.expired {
      color: #dc6e82;
    }
    .timer-display.pending {
      color: #8a8a9a;
    }
    .timer-display.confirmed {
      color: #5a6e5a;
    }
    .timer-meta {
      font-size: 10px;
      color: #5a5a6e;
      margin-top: 4px;
    }
    .timer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #5a5a6e;
    }

    .export-section {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .timer-list::-webkit-scrollbar {
      width: 6px;
    }
    .timer-list::-webkit-scrollbar-track {
      background: #08080f;
      border-radius: 3px;
    }
    .timer-list::-webkit-scrollbar-thumb {
      background: #2a2a3a;
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      .timer-item { flex-direction: column; align-items: stretch; }
      .timer-time { text-align: left; }
      .timer-display { font-size: 22px; }
      .timer-info { padding-right: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">
      <i class="fas fa-stopwatch"></i> 场控辅助系统
    </div>
    <div class="badge">
      <i class="fas fa-database"></i> 本地缓存已启用
    </div>
  </div>

  <div class="form-section">
    <div class="form-title">
      <i class="fas fa-plus-circle"></i> 新建倒计时
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>玩家编号 <span style="color:#8a8a9a;">(如 A2, C5)</span></label>
        <input type="text" id="playerCode" placeholder="例: A2" autocomplete="off">
      </div>
      <div class="form-group">
        <label>玩家姓名 <span style="color:#8a8a9a;">(可选)</span></label>
        <input type="text" id="playerName" placeholder="例: 张三" autocomplete="off">
      </div>
      <div class="form-group">
        <label>技能名称</label>
        <input type="text" id="skillName" placeholder="例: 隐身 / 载具 / 不死图腾" autocomplete="off">
      </div>
      <div class="form-group">
        <label>持续时间 <span style="color:#8a8a9a;">(秒)</span></label>
        <input type="number" id="durationSec" placeholder="例: 300" value="300" step="1" min="1">
      </div>
      <div class="form-group" style="flex: 0.5; min-width: auto;">
        <label>&nbsp;</label>
        <button class="btn btn-primary" id="createBtn" style="width: 100%;">
          <i class="fas fa-save"></i> 创建
        </button>
      </div>
    </div>
    <div style="font-size: 11px; color: #5a5a6e; margin-top: 8px;">
      <i class="fas fa-info-circle"></i> 创建后需要点击「开始」才会开始倒计时
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="expiredCount">0</div>
      <div class="stat-label">等待确认</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="pendingCount">0</div>
      <div class="stat-label">未开始</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="runningCount">0</div>
      <div class="stat-label">计时中</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="confirmedCount">0</div>
      <div class="stat-label">已确认</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="totalCount">0</div>
      <div class="stat-label">总计</div>
    </div>
  </div>

  <div class="timers-section">
    <div class="section-header">
      <h3><i class="fas fa-list"></i> 倒计时列表</h3>
      <div>
        <button class="btn btn-secondary btn-sm" id="clearCompletedBtn">
          <i class="fas fa-trash-alt"></i> 清除已确认
        </button>
        <button class="btn btn-secondary btn-sm" id="exportDataBtn" style="margin-left: 8px;">
          <i class="fas fa-download"></i> 导出数据
        </button>
      </div>
    </div>
    <div class="timer-list" id="timerList">
      <div class="empty-state">
        <i class="fas fa-hourglass-half" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
        暂无倒计时，请在上方创建
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== 数据结构 ====================
  // status: 'pending' | 'running' | 'expired' | 'confirmed'
  // 新增字段: createdAt (创建时间戳), startedAt (开始时间戳, 仅 running/expired/confirmed 时有值)
  
  let timers = [];
  let timerIntervals = {};

  const STORAGE_KEY = 'controller_timers_v3';

  // ==================== 声音提示 ====================
  let audioContext = null;
  
  function playBeep() {
    try {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = audioContext;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1);
      osc.stop(ctx.currentTime + 1);
    } catch(e) { console.log('声音播放失败:', e); }
    
    // 浮动通知
    const notificationDiv = document.createElement('div');
    notificationDiv.style.position = 'fixed';
    notificationDiv.style.top = '20px';
    notificationDiv.style.right = '20px';
    notificationDiv.style.background = '#dc6e82';
    notificationDiv.style.color = '#fff';
    notificationDiv.style.padding = '12px 20px';
    notificationDiv.style.borderRadius = '8px';
    notificationDiv.style.fontWeight = 'bold';
    notificationDiv.style.zIndex = '9999';
    notificationDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
    notificationDiv.innerHTML = '⏰ 倒计时已结束！';
    document.body.appendChild(notificationDiv);
    setTimeout(() => notificationDiv.remove(), 3000);
    
    // 系统通知
    if (Notification.permission === 'granted') {
      new Notification('⏰ 倒计时结束', { body: '有技能倒计时已结束，请确认', icon: '🔔' });
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
    
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }

  // ==================== 本地存储 ====================
  function loadFromStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        timers = JSON.parse(saved);
        for (const timer of timers) {
          if (timer.status === 'running') {
            startTimerInterval(timer);
          }
        }
        console.log('已加载', timers.length, '条记录');
      } catch(e) { console.error('加载失败', e); }
    }
    renderTimerList();
  }

  function saveToStorage() {
    const toSave = timers.map(t => ({
      id: t.id,
      playerCode: t.playerCode,
      playerName: t.playerName,
      skillName: t.skillName,
      durationSec: t.durationSec,
      remainingSec: t.remainingSec,
      status: t.status,
      createdAt: t.createdAt,
      startedAt: t.startedAt
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  }

  // ==================== 倒计时逻辑 ====================
  function startTimerInterval(timer) {
    if (timerIntervals[timer.id]) {
      clearInterval(timerIntervals[timer.id]);
    }
    
    timerIntervals[timer.id] = setInterval(() => {
      const currentTimer = timers.find(t => t.id === timer.id);
      if (!currentTimer || currentTimer.status !== 'running') {
        if (timerIntervals[timer.id]) {
          clearInterval(timerIntervals[timer.id]);
          delete timerIntervals[timer.id];
        }
        return;
      }
      
      if (currentTimer.remainingSec <= 1) {
        clearInterval(timerIntervals[timer.id]);
        delete timerIntervals[timer.id];
        currentTimer.status = 'expired';
        currentTimer.remainingSec = 0;
        saveToStorage();
        renderTimerList();
        playBeep();
      } else {
        currentTimer.remainingSec--;
        saveToStorage();
        renderTimerList();
      }
    }, 1000);
  }

  // ==================== 创建倒计时 ====================
  function createTimer(playerCode, playerName, skillName, durationSec) {
    if (!playerCode.trim()) {
      alert('请输入玩家编号');
      return false;
    }
    if (!skillName.trim()) {
      alert('请输入技能名称');
      return false;
    }
    const duration = parseInt(durationSec);
    if (isNaN(duration) || duration <= 0) {
      alert('请输入有效的持续时间（秒）');
      return false;
    }
    
    const newTimer = {
      id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
      playerCode: playerCode.trim().toUpperCase(),
      playerName: playerName.trim(),
      skillName: skillName.trim(),
      durationSec: duration,
      remainingSec: duration,
      status: 'pending',
      createdAt: Date.now(),
      startedAt: null
    };
    
    timers.unshift(newTimer);
    saveToStorage();
    renderTimerList();
    return true;
  }

  // ==================== 开始倒计时 ====================
  function startTimer(timerId) {
    const timer = timers.find(t => t.id === timerId);
    if (timer && timer.status === 'pending') {
      timer.status = 'running';
      timer.startedAt = Date.now();
      startTimerInterval(timer);
      saveToStorage();
      renderTimerList();
    }
  }

  // ==================== 确认倒计时 ====================
  function confirmTimer(timerId) {
    const timer = timers.find(t => t.id === timerId);
    if (timer && timer.status === 'expired') {
      timer.status = 'confirmed';
      if (timerIntervals[timer.id]) {
        clearInterval(timerIntervals[timer.id]);
        delete timerIntervals[timer.id];
      }
      saveToStorage();
      renderTimerList();
    }
  }

  // ==================== 删除倒计时 ====================
  function deleteTimer(timerId) {
    if (confirm('确定要删除这条记录吗？')) {
      const timer = timers.find(t => t.id === timerId);
      if (timer && timerIntervals[timer.id]) {
        clearInterval(timerIntervals[timer.id]);
        delete timerIntervals[timer.id];
      }
      timers = timers.filter(t => t.id !== timerId);
      saveToStorage();
      renderTimerList();
    }
  }

  // ==================== 清除所有已确认 ====================
  function clearCompleted() {
    if (confirm('确定要清除所有已确认的倒计时吗？')) {
      for (const timer of timers) {
        if (timer.status === 'confirmed' && timerIntervals[timer.id]) {
          clearInterval(timerIntervals[timer.id]);
          delete timerIntervals[timer.id];
        }
      }
      timers = timers.filter(t => t.status !== 'confirmed');
      saveToStorage();
      renderTimerList();
    }
  }

  // ==================== 导出数据 ====================
  function exportData() {
    const exportData = timers.map(t => {
      let statusText = '';
      if (t.status === 'pending') statusText = '未开始';
      else if (t.status === 'running') statusText = '计时中';
      else if (t.status === 'expired') statusText = '已到期待确认';
      else statusText = '已确认';
      
      return {
        序号: t.id,
        玩家编号: t.playerCode,
        玩家姓名: t.playerName,
        技能名称: t.skillName,
        持续时间_秒: t.durationSec,
        剩余秒数: t.remainingSec,
        状态: statusText,
        创建时间: t.createdAt ? new Date(t.createdAt).toLocaleString('zh-CN') : '',
        开始时间: t.startedAt ? new Date(t.startedAt).toLocaleString('zh-CN') : (t.status === 'pending' ? '未开始' : ''),
        结束时间: (t.status === 'expired' || t.status === 'confirmed') && t.startedAt ? 
          new Date(t.startedAt + t.durationSec * 1000).toLocaleString('zh-CN') : ''
      };
    });
    
    const dataStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `场控数据_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ==================== 格式化时间 ====================
  function formatTimestamp(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  }

  // ==================== 渲染列表 ====================
  function renderTimerList() {
    const container = document.getElementById('timerList');
    
    const expiredCount = timers.filter(t => t.status === 'expired').length;
    const pendingCount = timers.filter(t => t.status === 'pending').length;
    const runningCount = timers.filter(t => t.status === 'running').length;
    const confirmedCount = timers.filter(t => t.status === 'confirmed').length;
    const totalCount = timers.length;
    
    document.getElementById('expiredCount').textContent = expiredCount;
    document.getElementById('pendingCount').textContent = pendingCount;
    document.getElementById('runningCount').textContent = runningCount;
    document.getElementById('confirmedCount').textContent = confirmedCount;
    document.getElementById('totalCount').textContent = totalCount;
    
    if (timers.length === 0) {
      container.innerHTML = `<div class="empty-state">
        <i class="fas fa-hourglass-half" style="font-size: 32px; margin-bottom: 12px; display: block;"></i>
        暂无倒计时，请在上方创建
      </div>`;
      return;
    }
    
    const order = { 'expired': 0, 'pending': 1, 'running': 2, 'confirmed': 3 };
    const sorted = [...timers].sort((a, b) => {
      if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
      return b.createdAt - a.createdAt;
    });
    
    container.innerHTML = sorted.map(timer => {
      const status = timer.status;
      
      let timeDisplay = '';
      let timeClass = '';
      if (status === 'running') {
        const mins = Math.floor(timer.remainingSec / 60);
        const secs = timer.remainingSec % 60;
        timeDisplay = `${mins}:${secs < 10 ? '0' + secs : secs}`;
        timeClass = 'running';
      } else if (status === 'pending') {
        const mins = Math.floor(timer.durationSec / 60);
        const secs = timer.durationSec % 60;
        timeDisplay = `${mins}:${secs < 10 ? '0' + secs : secs}`;
        timeClass = 'pending';
      } else if (status === 'expired') {
        timeDisplay = '⏰ 已到期';
        timeClass = 'expired';
      } else {
        timeDisplay = '✓ 已确认';
        timeClass = 'confirmed';
      }
      
      const createTimeStr = formatTimestamp(timer.createdAt);
      const startTimeStr = timer.startedAt ? formatTimestamp(timer.startedAt) : (status === 'pending' ? '未开始' : '');
      
      return `
        <div class="timer-item status-${status}" data-id="${timer.id}">
          <div class="delete-icon" onclick="window.deleteTimer('${timer.id}')">
            <i class="fas fa-times"></i>
          </div>
          <div class="timer-info">
            <div class="timer-code">${escapeHtml(timer.playerCode)}</div>
            <div class="timer-name">${timer.playerName ? escapeHtml(timer.playerName) : '<span style="color:#5a5a6e;">未填写姓名</span>'}</div>
            <div class="timer-skill"><i class="fas fa-magic"></i> ${escapeHtml(timer.skillName)}</div>
            <div class="timer-meta">
              <i class="far fa-clock"></i> 创建 ${createTimeStr}
              ${startTimeStr ? ` | <i class="fas fa-play"></i> 开始 ${startTimeStr}` : ''}
            </div>
          </div>
          <div class="timer-time">
            <div class="timer-display ${timeClass}">${timeDisplay}</div>
            <div style="font-size: 10px; color: #5a5a6e;">${timer.durationSec}秒</div>
          </div>
          <div class="timer-actions">
            ${status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="window.startTimer('${timer.id}')"><i class="fas fa-play"></i> 开始</button>` : ''}
            ${status === 'expired' ? `<button class="btn btn-primary btn-sm" onclick="window.confirmTimer('${timer.id}')"><i class="fas fa-check"></i> 确认</button>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ==================== 事件绑定 ====================
  document.getElementById('createBtn').addEventListener('click', () => {
    const playerCode = document.getElementById('playerCode').value;
    const playerName = document.getElementById('playerName').value;
    const skillName = document.getElementById('skillName').value;
    const durationSec = document.getElementById('durationSec').value;
    
    if (createTimer(playerCode, playerName, skillName, durationSec)) {
      document.getElementById('playerCode').value = '';
      document.getElementById('skillName').value = '';
      document.getElementById('durationSec').value = '300';
      document.getElementById('playerCode').focus();
    }
  });
  
  document.getElementById('clearCompletedBtn').addEventListener('click', () => {
    clearCompleted();
  });
  
  document.getElementById('exportDataBtn').addEventListener('click', () => {
    exportData();
  });
  
  const inputIds = ['playerCode', 'playerName', 'skillName', 'durationSec'];
  inputIds.forEach(id => {
    document.getElementById(id).addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('createBtn').click();
      }
    });
  });
  
  window.startTimer = startTimer;
  window.confirmTimer = confirmTimer;
  window.deleteTimer = deleteTimer;
  
  window.addEventListener('beforeunload', () => {
    saveToStorage();
  });
  
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  
  document.body.addEventListener('click', function initAudio() {
    if (audioContext && audioContext.state === 'suspended') {
      audioContext.resume();
    }
  }, { once: true });
  
  loadFromStorage();
</script>
</body>
</html>
